<div class="wf-rego-bar">

  <!-- ROW 1: dark title band -->
  <div class="wf-rego-header">
    <span class="wf-rego-header__text">
      FIND MY VEHICLE<span class="wf-rego-header__sep"> </span>
      <span class="wf-rego-header__sub">: Enter your REGO to view Vehicle Specific Parts :</span>
    </span>
  </div>

  <!-- ROW 2: light input band -->
  <div class="wf-rego-fields">
    <div class="wf-rego-fields__inner">
      <input
        type="text"
        id="plate"
        placeholder="REGO Number"
        maxlength="10"
        autocomplete="off"
        autocapitalize="characters"
      />
      <select title="place" id="place">
        <option value="">Select your State</option>
        <option value="AU-ACT">ACT</option>
        <option value="AU-NSW">NSW</option>
        <option value="AU-NT">NT</option>
        <option value="AU-QLD">QLD</option>
        <option value="AU-SA">SA</option>
        <option value="AU-TAS">TAS</option>
        <option value="AU-VIC">VIC</option>
        <option value="AU-WA">WA</option>
        <option value="NZ-">NEW ZEALAND</option>
      </select>
      <button id="search-button" class="wf-btn-search">SEARCH / FIND</button>
      <button id="clear-button" class="wf-btn-clear">CLEAR</button>
    </div>
  </div>

</div>

<script>
  const partsFinderUrl = "/find-my-vehicle.html";

  let searchButton = document.querySelector("#search-button");
  searchButton.addEventListener("click", (e) => {
    let plate = document.querySelector("#plate").value.trim().toUpperCase();
    let place = document.querySelector("#place").value;
    let params = new URLSearchParams({
      searchType: "regoSearch",
      plate: plate,
      place: place,
    });
    window.location.href = `${partsFinderUrl}?${params.toString()}`;
  });

  let clearButton = document.querySelector("#clear-button");
  clearButton.addEventListener("click", (e) => {
    document.querySelector("#plate").value = "";
    document.querySelector("#place").value = "";
    document.querySelector("#place").classList.remove("has-value");
  });

  document.querySelector("#place").addEventListener("change", (e) => {
    e.target.classList.toggle("has-value", e.target.value !== "");
  });

  document.querySelector("#plate").addEventListener("input", (e) => {
    e.target.value = e.target.value.replace(/[\s-]/g, '').toUpperCase();
  });
</script>
